<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — SIP Admin</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/erp-style.css">
</head>

<body>
    <script>if (sessionStorage.getItem('adminLoggedIn') !== 'true') window.location.href = 'admin-login.html';</script>
    <div class="erp-layout">
        <main class="erp-main">
            <header class="erp-header">
                <div class="header-left">
                    <div class="header-title">Messages</div>
                </div>
                <div class="header-right">
                    <div class="header-user">
                        <div class="user-avatar" id="header-avatar">AD</div>
                        <div class="user-info">
                            <div class="user-name" id="header-user-name">Admin</div>
                            <div class="user-role">Administrator</div>
                        </div>
                    </div>
                </div>
            </header>
            <div class="erp-content" style="padding-bottom:0;">
                <div class="chat-layout">
                    <!-- Left: User list -->
                    <div class="chat-sidebar">
                        <div class="chat-sidebar-header">
                            <i class="fa fa-comments" style="color:var(--accent);margin-right:8px;"></i> Conversations
                            <span id="unreadCount"
                                style="font-size:.72rem;background:var(--danger);color:#fff;padding:2px 7px;border-radius:10px;margin-left:6px;display:none;"></span>
                        </div>
                        <!-- New Message Button -->
                        <div style="padding:10px 12px;border-bottom:1px solid var(--border);">
                            <button class="btn btn-primary w-100 btn-sm" onclick="showNewChat()"><i
                                    class="fa fa-plus"></i> New Message</button>
                        </div>
                        <div class="chat-list" id="chatList">
                            <div style="text-align:center;padding:30px;color:var(--text-muted);font-size:.82rem;">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Right: Message thread -->
                    <div class="chat-main">
                        <div class="chat-header" id="chatHeader">
                            <div style="text-align:center;width:100%;color:var(--text-muted);font-size:.85rem;">
                                <i class="fa fa-comments"
                                    style="font-size:2rem;opacity:.2;display:block;margin-bottom:8px;"></i>
                                Select a conversation or start a new message
                            </div>
                        </div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-area" id="chatInputArea" style="display:none;">
                            <textarea class="chat-input" id="msgInput" placeholder="Type a message... (Enter to send)"
                                rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                            <button class="btn btn-primary" onclick="sendMessage()"><i
                                    class="fa fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- New Chat Modal -->
    <div class="modal-overlay" id="newChatModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fa fa-plus"></i> New Message</h3><button class="modal-close"
                    onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Select Recipient</label>
                    <select id="recipientSelect" class="form-control">
                        <option value="">— Select User —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea id="newMsgText" class="form-control" rows="4"
                        placeholder="Type your message..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="sendNewMessage()"><i class="fa fa-paper-plane"></i>
                    Send</button>
                <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/erp-common.js"></script>
    <script>
        buildAdminSidebar('messages');
        let allMessages = [], allReviewers = [], activeUserId = '', activeUserName = '';
        let pollInterval = null;

        async function init() {
            const [msgRes, rvRes] = await Promise.all([
                apiGet({ action: 'getMessages', userId: 'admin' }),
                apiGet({ action: 'getReviewers' })
            ]);
            allMessages = msgRes.status === 'success' ? msgRes.data : [];
            allReviewers = rvRes.status === 'success' ? rvRes.data : [];
            renderConversationList();
            populateRecipients();
            startPolling();
            logActivity('Page Visit', 'Opened messaging', 'messages');
        }

        function getConversations() {
            // Group messages by the "other" person (not admin)
            const convMap = {};
            allMessages.forEach(m => {
                const from = String(m['From'] || ''), to = String(m['To'] || '');
                const otherId = from === 'admin' ? to : from;
                const otherName = from === 'admin' ? (m['To Name'] || to) : (m['From Name'] || from);
                if (!otherId || otherId === 'admin') return;
                if (!convMap[otherId]) convMap[otherId] = { id: otherId, name: otherName, messages: [], unread: 0 };
                convMap[otherId].messages.push(m);
                if (String(m['To']) === 'admin' && String(m['Read']) !== 'true') convMap[otherId].unread++;
            });
            return Object.values(convMap);
        }

        function renderConversationList() {
            const convs = getConversations();
            const totalUnread = convs.reduce((s, c) => s + c.unread, 0);
            const uc = document.getElementById('unreadCount');
            uc.textContent = totalUnread;
            uc.style.display = totalUnread > 0 ? 'inline' : 'none';

            const list = document.getElementById('chatList');
            if (!convs.length) { list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:.82rem;">No conversations yet.<br>Start a new message!</div>'; return; }
            list.innerHTML = convs.sort((a, b) => b.unread - a.unread).map(c => {
                const last = c.messages[c.messages.length - 1];
                return `<div class="chat-item ${c.id === activeUserId ? 'active' : ''}" onclick="openConversation('${c.id}','${c.name.replace(/'/g, "\\'")}')">
          <div class="chat-avatar">${c.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)}</div>
          <div class="chat-item-info">
            <div class="chat-item-name">${c.name}</div>
            <div class="chat-item-preview">${String(last?.['Message'] || '').substring(0, 30)}</div>
          </div>
          ${c.unread > 0 ? `<div class="chat-item-unread">${c.unread}</div>` : ''}
        </div>`;
            }).join('');
        }

        async function openConversation(userId, userName) {
            activeUserId = userId; activeUserName = userName;
            document.getElementById('chatHeader').innerHTML = `
        <div class="chat-avatar">${userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)}</div>
        <div><div style="font-weight:700;font-size:.9rem;">${userName}</div><div style="font-size:.75rem;color:var(--text-muted);">ID: ${userId}</div></div>`;
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('chatMessages').innerHTML = '';
            await renderThread();
            // Mark unread as read
            const unread = allMessages.filter(m => String(m['From']) === userId && String(m['To']) === 'admin' && String(m['Read']) !== 'true');
            for (const m of unread) {
                await apiPost({ action: 'markMessageRead', messageId: m['Message ID'] });
            }
            renderConversationList();
        }

        function renderThread() {
            const thread = allMessages.filter(m => {
                const from = String(m['From'] || ''), to = String(m['To'] || '');
                return (from === 'admin' && to === activeUserId) || (from === activeUserId && to === 'admin');
            });
            const box = document.getElementById('chatMessages');
            box.innerHTML = thread.length ? thread.map(m => {
                const isSent = String(m['From']) === 'admin';
                return `<div class="msg ${isSent ? 'sent' : 'recv'}">
          <div class="msg-bubble">${String(m['Message'] || '').replace(/\n/g, '<br>')}</div>
          <div class="msg-meta">${fmtDT(m['Timestamp'])}</div>
        </div>`;
            }).join('') : '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:.85rem;">No messages yet. Say hello!</div>';
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeUserId) return;
            input.value = ''; input.style.height = 'auto';
            const adminName = sessionStorage.getItem('userName') || 'Admin';
            await apiPost({ action: 'sendMessage', from: 'admin', fromName: adminName, to: activeUserId, toName: activeUserName, message: text });
            // Reload messages
            const res = await apiGet({ action: 'getMessages', userId: 'admin' });
            allMessages = res.status === 'success' ? res.data : allMessages;
            renderThread();
            renderConversationList();
        }

        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

        function showNewChat() {
            document.getElementById('newChatModal').classList.add('show');
        }

        function populateRecipients() {
            const sel = document.getElementById('recipientSelect');
            sel.innerHTML = '<option value="">— Select User —</option>' +
                allReviewers.filter(r => String(r['Status'] || '').toLowerCase() === 'active').map(r =>
                    `<option value="${r['Reviewer ID']}" data-name="${r['First Name']} ${r['Last Name']}">${r['First Name']} ${r['Last Name']} (${r['Role'] || 'Reviewer'})</option>`
                ).join('');
        }

        async function sendNewMessage() {
            const sel = document.getElementById('recipientSelect');
            const toId = sel.value;
            const toName = sel.options[sel.selectedIndex]?.dataset?.name || '';
            const text = document.getElementById('newMsgText').value.trim();
            if (!toId || !text) { showToast('Select a recipient and enter a message', 'warning'); return; }
            const adminName = sessionStorage.getItem('userName') || 'Admin';
            await apiPost({ action: 'sendMessage', from: 'admin', fromName: adminName, to: toId, toName, message: text });
            showToast('✓ Message sent to ' + toName, 'success');
            closeModal();
            const res = await apiGet({ action: 'getMessages', userId: 'admin' });
            allMessages = res.status === 'success' ? res.data : allMessages;
            renderConversationList();
            if (activeUserId === toId) renderThread();
            document.getElementById('newMsgText').value = '';
        }

        function closeModal() { document.getElementById('newChatModal').classList.remove('show'); }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const res = await apiGet({ action: 'getMessages', userId: 'admin' });
                if (res.status === 'success') {
                    allMessages = res.data;
                    renderConversationList();
                    if (activeUserId) renderThread();
                }
            }, 10000); // Poll every 10 seconds
        }

        init();
    </script>
</body>

</html>
